kind = "web"
previewPath = "/"
title = "Mystery Escape"
version = "1.0.0"
id = "artifacts/mystery-escape"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24708

[services.development]
run = "pnpm --filter @workspace/mystery-escape run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mystery-escape", "run", "build" ]
publicDir = "artifacts/mystery-escape/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24708"
BASE_PATH = "/"
